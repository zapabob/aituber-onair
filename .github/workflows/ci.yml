name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build packages in dependency order
        run: |
          npm -w @aituber-onair/chat run build
          npm -w @aituber-onair/voice run build
          npm -w @aituber-onair/core run build

      - name: Run tests
        run: npm run test --workspaces

      - name: Run lint
        run: npm run lint --workspaces

      - name: Check formatting
        run: npm run fmt:check --workspaces

  fbx-react-example:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/core/examples/react-fbx-app/package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build local packages used by the FBX example
        run: |
          npm -w @aituber-onair/chat run build
          npm -w @aituber-onair/voice run build
          npm -w @aituber-onair/core run build
          npm -w @aituber-onair/comment-intelligence run build
          npm -w @aituber-onair/manneri run build

      - name: Install FBX example dependencies
        working-directory: packages/core/examples/react-fbx-app
        run: npm ci

      - name: Lint FBX example
        working-directory: packages/core/examples/react-fbx-app
        run: npm run lint

      - name: Build FBX example
        working-directory: packages/core/examples/react-fbx-app
        run: npm run build
